<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Počasí</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div class="dashboard">
  <aside class="sidebar">
    <div class="search-row">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="city-input" placeholder="Hledat město…" maxlength="80"/>
      <button onclick="handleSearch()">Hledat</button>
    </div>
    <div class="weather-visual">
      <div class="weather-art">
        <div class="sun-circle"></div>
        <div class="cloud-shape"></div>
        <div class="rain-lines">
          <div class="rain-line"></div><div class="rain-line"></div>
          <div class="rain-line"></div><div class="rain-line"></div>
        </div>
      </div>
    </div>
    <div class="temp-display">
      <div class="temp-big" id="temp-big">—</div>
      <div class="temp-day" id="temp-day">Zadej město pro počasí</div>
    </div>
    <div class="condition-tags">
      <div class="tag">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></svg>
        <span id="cond-desc">Počasí</span>
      </div>
      <div class="tag">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.8"><path d="M7 19c-1.7 0-3-1.3-3-3s1.3-3 3-3h10c1.7 0 3-1.3 3-3s-1.3-3-3-3-3 1.3-3 3"/></svg>
        <span id="cond-rain">Srážky</span>
      </div>
    </div>
    <div class="city-card">
      <div class="city-card-bg"></div>
      <span class="city-card-name" id="city-card-name">—</span>
    </div>
    <p class="sidebar-error hidden" id="sidebar-error"></p>
  </aside>

  <div class="main" id="main-panel">
    <div class="topbar">
      <div class="tabs">
        <button class="tab-btn active" id="tab-today" onclick="switchTab('today')">Dnes</button>
        <button class="tab-btn" id="tab-week" onclick="switchTab('week')">Týden</button>
      </div>
      <div class="unit-toggle">
        <button class="unit-btn active" id="unit-c" onclick="switchUnit('C')">°C</button>
        <button class="unit-btn" id="unit-f" onclick="switchUnit('F')">°F</button>
      </div>
    </div>
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">🌤</div>
      <div class="empty-text">Zadej název města pro zobrazení počasí.</div>
    </div>
    <div class="loading-state hidden" id="loading-state">
      <div class="spin"></div><span>Načítám počasí…</span>
    </div>
    <div id="content" class="hidden" style="display:flex;flex-direction:column;gap:1.25rem;">
      <div class="week-grid" id="week-grid"></div>
      <div class="section-title">Dnešní přehled</div>
      <div class="highlights-grid">
        <div class="hl-card">
          <div class="hl-label">UV Index</div>
          <div class="uv-gauge">
            <svg width="96" height="54" viewBox="0 0 100 56" fill="none">
              <path d="M10 50 A40 40 0 0 1 90 50" stroke="#e8e8e4" stroke-width="8" stroke-linecap="round"/>
              <path id="uv-arc" d="M10 50 A40 40 0 0 1 90 50" stroke="#f59f00" stroke-width="8" stroke-linecap="round" stroke-dasharray="0 126"/>
            </svg>
            <div class="uv-num" id="uv-val">—</div>
          </div>
          <div class="hl-sub" id="uv-desc">—</div>
        </div>
        <div class="hl-card">
          <div class="hl-label">Rychlost větru</div>
          <div class="hl-value" id="wind-val">—<span class="hl-unit"> km/h</span></div>
          <div class="hl-sub">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            <span id="wind-dir-text">—</span>
          </div>
        </div>
        <div class="hl-card">
          <div class="hl-label">Východ a západ</div>
          <div class="sun-times">
            <div class="sun-row">
              <div class="sun-dot up">↑</div>
              <div class="sun-info"><span class="sun-time" id="sunrise">—</span><span class="sun-diff">Východ</span></div>
            </div>
            <div class="sun-row">
              <div class="sun-dot down">↓</div>
              <div class="sun-info"><span class="sun-time" id="sunset">—</span><span class="sun-diff">Západ</span></div>
            </div>
          </div>
        </div>
        <div class="hl-card">
          <div class="hl-label">Vlhkost</div>
          <div class="hl-value" id="hum-val">—<span class="hl-unit"> %</span></div>
          <div class="hl-bar"><div class="hl-bar-fill" id="hum-bar" style="width:0%"></div></div>
          <div class="hl-sub" id="hum-desc">—</div>
        </div>
        <div class="hl-card">
          <div class="hl-label">Viditelnost</div>
          <div class="hl-value" id="vis-val">—<span class="hl-unit"> km</span></div>
          <div class="hl-bar"><div class="hl-bar-fill" id="vis-bar" style="width:0%;background:#3b5bdb"></div></div>
          <div class="hl-sub" id="vis-desc">—</div>
        </div>
        <div class="hl-card">
          <div class="hl-label">Tlak vzduchu</div>
          <div class="hl-value" id="pres-val">—<span class="hl-unit"> hPa</span></div>
          <div class="hl-bar"><div class="hl-bar-fill" id="pres-bar" style="width:0%;background:#862e9c"></div></div>
          <div class="hl-sub" id="pres-desc">—</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
